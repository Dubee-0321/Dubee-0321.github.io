<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beginner's Guide - Circulatory System</title>
  <style>
    body {
      background-color: #ff5f52;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    .content-card {
      background-color: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      backdrop-filter: blur(5px);
      margin-bottom: 30px;
    }

    p {
      line-height: 1.6;
      font-size: 1.1rem;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 25px;
      background-color: white;
      color: #ff5f52;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      transform: scale(1.05);
      background-color: #fff0ef;
    }
  </style>
</head>
<body>

  <h1>Beginner's Guide</h1>
  
  <div class="content-card">
    <p>순환계는 우리 몸 곳곳에 필요한 영양분과 산소를 전달하는 고속도로와 같아요!<br><br>
    심장, 혈관, 그리고 혈액이 어떻게 우리 몸을 도와주는지 기초부터 차근차근 알아봅시다.</p>
  </div>

  <a href="index.html" class="back-btn">🏠 돌아가기</a>

</body>
</html>
