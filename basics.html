<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beginner's Guide</title>
  <style>
    body {
      background-color: #ff5f52;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

 

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-block;
      padding: 10px 20px;
      background-color: transparent;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      border: 2px solid white;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      z-index: 10;
    }

    .back-btn:hover {
      background-color: white;
      color: #ff5f52;
      transform: scale(1.05);
    }

  
    .content-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 800px;
      width: 100%;
      margin: 40px 0;
    }

   
    .topic-card {
      background-color: white;
      color: #ff5f52;
      padding: 40px;
      border-radius: 20px;
      text-align: left;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      min-height: 450px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

   
    .topic-card h3 {
      margin: 0;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

 
    .card-image {
      width: 100%;
      height: 250px;
      background-color: #fceceb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffb4ac;
      font-weight: bold;
      border: 2px dashed #ffb4ac;
    }
  </style>
</head>
<body>

  
  <a href="index.html" class="back-btn">Return to Main</a>

  <h1>Beginner's Guide</h1>
  
  <div class="content-grid">
    
    <div class="topic-card">
      <div class="card-image"></div>
      <h3></h3>
      <p></p>
    </div>

    
    <div class="topic-card">
      <div class="card-image"></div>
      <h3></h3>
      <p></p>
    </div>
  </div>

</body>
