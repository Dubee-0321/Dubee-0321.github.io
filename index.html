<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subeen's Circulatory System</title>
  <style>
    /* 배경 및 중앙 정렬 레이아웃 */
    body {
      background-color: #ff5f52; /* 자몽색 배경 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 5px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 15px;
    }

    /* 하얀색 혈관 일러스트 스타일 */
    .vessel-img {
      max-width: 250px;
      height: auto;
      margin: 20px 0;
      filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.4));
      transition: transform 0.3s ease;
    }

    .vessel-img:hover {
      transform: scale(1.05);
    }

    /* 버튼들을 가로로 나열하는 컨테이너 */
    .button-container {
      display: flex;
      flex-direction: row; 
      gap: 15px; 
      margin-top: 30px;
      flex-wrap: wrap; 
      justify-content: center;
      max-width: 1000px;
    }

    /* 공통 버튼 스타일 */
    .menu-btn {
      display: inline-block;
      padding: 18px 25px;
      background-color: white;
      color: #ff5f52;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      min-width: 240px; 
      box-sizing: border-box;
    }

    .menu-btn:hover {
      background-color: #fff0ef;
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    /* 반응형 설정: 화면이 좁아지면 버튼을 세로로 정렬 */
    @media (max-width: 850px) {
      .button-container {
        flex-direction: column;
        align-items: center;
      }
      .menu-btn {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <h1>Welcome</h1>
  <p class="subtitle">Subeen's first Website</p>
  
  <img src="https://cdn-icons-png.flaticon.com/512/2865/2865805.png" 
       alt="순환계 일러스트" 
       class="vessel-img">

  <div class="button-container">
    <!-- 가장 왼쪽에 위치한 입문자용 버튼 (Beginner's Guide) -->
    <a href="basics.html" class="menu-btn">Beginner's Guide ➔</a>

    <!-- 기존 개념 학습 버튼 -->
    <a href="heart.html" class="menu-btn">About the Circulatory System ➔</a>

    <!-- 심화 탐구 버튼 -->
    <a href="inquiry.html" class="menu-btn">Advanced Research Hub ➔</a>
  </div>

</body>
</html>
