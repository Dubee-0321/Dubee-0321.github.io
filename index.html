<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subeen's Circulatory System</title>
  <style>
    body {
      background-color: #ff5f52;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 5px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 15px;
    }

    .vessel-img {
      max-width: 250px;
      height: auto;
      margin: 20px 0;
      filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.4));
      transition: transform 0.3s ease;
    }

    .vessel-img:hover {
      transform: scale(1.05);
    }

    .button-container {
      display: flex;
      flex-direction: row; 
      gap: 15px; 
      margin-top: 30px;
      flex-wrap: wrap; 
      justify-content: center;
      max-width: 1100px;
    }

    .menu-btn {
      display: inline-block;
      padding: 18px 25px;
      background-color: white;
      color: #ff5f52;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      min-width: 250px; 
      box-sizing: border-box;
    }

    .menu-btn:hover {
      background-color: #fff0ef;
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    @media (max-width: 850px) {
      .button-container {
        flex-direction: column;
        align-items: center;
      }
      .menu-btn {
        width: 90%;
      }
    }


    .how-to-use-container {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-block;
      cursor: pointer;
    }

    .how-to-use-btn {
      color: white;
      font-style: italic;
      text-decoration: underline;
      font-weight: bold;
      font-size: 1.3rem; /* 1rem에서 1.3rem으로 키움 */
      display: inline-block;
    }

    
    .tooltip {
      visibility: hidden;
      width: 180px;
      background-color: white;
      color: #ff5f52;
      text-align: center;
      border-radius: 10px;
      padding: 12px;
      position: absolute;
      z-index: 1;
      
   
      top: 50%;
      left: 110%;
      transform: translateY(-50%);
      
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      font-size: 1rem;
    }

   
    .how-to-use-container:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="how-to-use-container">
    <span class="how-to-use-btn">How to use</span>
    <div class="tooltip">Hi!</div>
  </div>
  <h1>Welcome</h1>
  <p class="subtitle">Subeen's first Website</p>
  
  <img src="https://cdn-icons-png.flaticon.com/512/2865/2865805.png" 
       alt="순환계 일러스트" 
       class="vessel-img">

  <div class="button-container">
    <a href="basics.html" class="menu-btn">Beginner's Guide ➔</a>

    <a href="heart.html" class="menu-btn">About the Circulatory System ➔</a>

    <a href="inquiry.html" class="menu-btn">Advanced Research Hub ➔</a>
  </div>

</body>
</html>
