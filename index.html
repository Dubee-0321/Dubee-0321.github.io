<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>내 홈페이지</title>
  <style>
    body {
      background-color: #ff5f52;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 5px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    /* 캐릭터 윤곽선 스타일 */
    .circulation-img {
      max-width: 250px; 
      /* 그림 모양대로 하얀 테두리 만들기 */
      filter: drop-shadow(0 0 2px white) drop-shadow(0 0 2px white) drop-shadow(0 0 5px white);
      margin: 25px 0;
    }

    p {
      font-size: 1.5rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>Welcome</h1>
  
  <img src="https://cdn-icons-png.flaticon.com/512/2904/2904845.png" alt="순한 심장" class="circulation-img">
<style>
  /* 버튼을 예쁘게 만드는 스타일 (style 태그 안에 추가) */
  .menu-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    background-color: white; /* 버튼은 하얀색 */
    color: #ff5f52; /* 글자는 자몽색 */
    text-decoration: none; /* 밑줄 제거 */
    border-radius: 50px; /* 알약 모양 */
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
  }
  .menu-btn:hover {
    transform: translateY(-5px); /* 마우스 올리면 뿅 올라감 */
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
</style>

<body>
  <h1>Welcome</h1>
  <img src="https://cdn-icons-png.flaticon.com/512/2904/2904845.png" alt="순한 심장" class="circulation-img">
  <p>Subeen's first Website</p>
  
  <a href="heart.html" class="menu-btn">심장 알아보기 ➔</a>
</body>
  <p>Subeen's first Website</p>
</body>
</html>
