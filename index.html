<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About the Circulatory System</title>
  <style>
    body {
      background-color: #ff5f52; /* 수빈님의 자몽색 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 5px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    /* 혈관 이미지 스타일 */
    .vessel-img {
      max-width: 280px;
      height: auto;
      margin: 20px 0;
      /* 👇 검은색 아이콘을 하얀색으로 바꿔주는 필터! */
      filter: brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.3));
      transition: transform 0.3s ease;
    }

    .vessel-img:hover {
      transform: scale(1.05);
    }

    /* 이동 버튼 스타일 */
    .menu-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 35px;
      background-color: white;
      color: #ff5f52;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .menu-btn:hover {
      background-color: #fff0ef;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h1>Welcome</h1>
  <p class="subtitle">Subeen's first Website</p>
  
  <!-- 검증된 혈관 일러스트 링크 (옵션 1 적용) -->
  <img src="https://cdn-icons-png.flaticon.com/512/2865/2865805.png" 
       alt="White Blood Vessels" 
       class="vessel-img">

  <br>
  
  <!-- 버튼을 누르면 이전에 만든 heart.html로 이동합니다 -->
  <a href="heart.html" class="menu-btn">About the Circulatory System ➔</a>

</body>
</html>
