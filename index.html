<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>수빈의 홈페이지</title>
  <style>
    body {
      /* 붉은 빛이 더 도는 진한 자몽색 (Reddish Grapefruit) */
      background-color: #ff5f52; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    h1 {
      color: #ffffff; 
      font-size: 3.5rem;
      margin-bottom: 5px;
      /* 글씨가 배경에서 더 돋보이게 그림자 톡! */
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    p {
      color: white;
      font-size: 1.2rem;
      opacity: 0.9; /* 살짝 투명하게 해서 세련된 느낌 */
      letter-spacing: 1px; /* 글자 간격을 넓혀서 더 깔끔하게 */
    }
  </style>
</head>
<body>
  <h1>Welcome</h1>
  <p>Subeen's first Website</p>
</body>
</html>
