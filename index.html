<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>수빈의 귀여운 순환계 탐험</title>
  <style>
    body {
      background-color: #ff5f52; /* 수빈님이 고른 그 자몽색! */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    /* 이미지 예쁘게 만드는 스타일 */
    .circulation-img {
      max-width: 300px; /* 그림 크기 조절 */
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>심장이 두근두근! 순환계 탐험 🍊</h1>
  
  <img src="https://i.pinimg.com/originals/f4/1b/3d/f41b3d4f8f4a13b6b1a2f6a7d5b1f5f3.gif" alt="귀여운 심장" class="circulation-img">

  <p>우리 몸의 혈액은 어떻게 순환할까요?<br>수빈이와 함께 알아보는 순환계 이야기!</p>
</body>
</html>
