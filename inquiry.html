<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Research Hub</title>
  <style>
    body {
      background-color: #ff5f52;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
    }

    .research-grid {
      display: grid;
      gap: 20px;
      max-width: 800px;
      width: 100%;
      margin-bottom: 30px;
    }

    .topic-card {
      background-color: white;
      color: #ff5f52;
      padding: 20px;
      border-radius: 15px;
      text-align: left;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .topic-card h3 {
      margin-top: 0;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 25px;
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      border: 2px solid white;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background-color: white;
      color: #ff5f52;
    }
  </style>
</head>
<body>

  <h1>Advanced Research Hub</h1>
  
  <div class="research-grid">
    <div class="topic-card">
      <h3>🔬 심화 주제 1</h3>
      <p>심장 박동수의 변화와 운동의 상관관계에 대한 심층 분석</p>
    </div>
    <div class="topic-card">
      <h3>🔬 심화 주제 2</h3>
      <p>혈관 건강을 지키는 생활 습관과 과학적 원리 탐구</p>
    </div>
  </div>

  <a href="index.html" class="back-btn">🏠 메인 화면으로</a>

</body>
</html>
